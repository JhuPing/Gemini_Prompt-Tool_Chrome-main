<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>AI 提示詞助手 - 管理後台</title>
  <style>
    :root {
      --primary-color: #4285f4;
      --bg-color: #f8f9fa;
      --sidebar-color: #1e1f21;
      --text-main: #3c4043;
      --text-sub: #5f6368;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; background: var(--bg-color); color: var(--text-main); }

    /* 側邊欄 */
    #sidebar { width: 280px; background: var(--sidebar-color); color: #fff; padding: 30px 0; flex-shrink: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
    .brand { padding: 0 30px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 25px; }
    .main-title { font-size: 22px; font-weight: 800; color: var(--primary-color); margin-bottom: 4px; }
    .sub-title { font-size: 13px; color: #9aa0a6; letter-spacing: 1px; }
    
    .nav-item { padding: 16px 30px; cursor: pointer; color: #bdc1c6; transition: 0.3s; display: flex; align-items: center; font-size: 15px; justify-content: space-between; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(66, 133, 244, 0.1); color: var(--primary-color); border-left: 5px solid var(--primary-color); font-weight: bold; }

    /* 縮合選單 */
    .sub-nav-container { background: rgba(0, 0, 0, 0.2); overflow: hidden; transition: max-height 0.3s ease-in-out; }
    .sub-item { padding-left: 50px; font-size: 14px; justify-content: flex-start; }
    .arrow { font-size: 10px; transition: transform 0.3s; }
    .collapsed .arrow { transform: rotate(-90deg); }
    .collapsed .sub-nav-container { max-height: 0 !important; }

    /* 主內容區 */
    #main-content { flex: 1; overflow-y: auto; padding: 50px 60px; }
    .section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
    .section.active { display: block; opacity: 1; transform: translateY(0); }
    .card { background: white; padding: 45px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { font-size: 24px; font-weight: 700; color: #202124; margin-bottom: 8px; }

    /* 按鈕樣式規範 */
    button { padding: 10px 24px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
    .btn-main { background: var(--primary-color); color: white; }
    .btn-gray-blue { background: #f1f3f4; color: var(--primary-color); }
    .btn-gray-blue:hover { background: #e8f0fe; }
    .btn-gray-red { background: #f1f3f4; color: #d93025; }
    .btn-gray-red:hover { background: #feeeee; }
    .btn-gray-black { background: #f1f3f4; color: #3c4043; }
    .btn-gray-black:hover { background: #e8e8e8; }
    
    /* 表格與表單 */
    table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 10px; }
    th { text-transform: uppercase; font-size: 13px; color: #70757a; padding: 15px 12px; border-bottom: 2px solid #f1f3f4; text-align: left; }
    td { padding: 20px 12px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
    .text-truncate { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-sub); }
    .form-input { width: 100%; padding: 14px 18px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-top: 10px; outline: none; }
    textarea.form-input { height: 300px; resize: vertical; }

    /* 外觀預覽 */
    .appearance-container { display: flex; gap: 50px; }
    .color-picker-wrapper { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: #fff; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
    #sandbox-menu { width: 100%; max-width: 340px; border-radius: 14px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); }
    .sb-item { padding: 18px 24px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="brand"><div class="main-title">AI 提示詞助手</div><div class="sub-title">讓溝通更有效率</div></div>
    <div id="prompt-group-wrapper">
      <div class="nav-item parent-nav" id="prompt-menu-toggle"><span>提示詞設定</span><span class="arrow">▼</span></div>
      <div class="sub-nav-container" id="prompt-submenu">
        <div class="nav-item sub-item active" data-target="section-main" data-type="identities">身份</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="events">指令</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="styles">風格</div>
      </div>
    </div>
    <div class="nav-item" data-target="appearance-section">外觀設定</div>
    <div class="nav-item" data-target="about-section">關於作者</div>
  </div>

  <div id="main-content">
    <div id="section-main" class="section active">
      <div id="list-view">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px;">
            <div><h2 id="page-title">身份</h2><p id="page-desc" style="color: var(--text-sub); font-size: 14px;"></p></div>
            <button class="btn-main" id="btn-new">新增</button>
          </div>
          <table>
            <thead><tr id="table-head"></tr></thead>
            <tbody id="data-list-body"></tbody>
          </table>
        </div>
      </div>
      <div id="editor-view" style="display: none;">
        <div class="card">
          <h2 id="editor-title">編輯</h2>
          <div style="margin-top: 25px;">
            <div style="margin-bottom: 25px;"><label>名稱</label><input type="text" id="edit-label" class="form-input"></div>
            <div id="group-shortcut" style="display:none; margin-bottom: 25px;"><label>代號</label><input type="text" id="edit-shortcut" class="form-input"></div>
            <div style="margin-bottom: 30px;"><label>內容</label><textarea id="edit-text" class="form-input"></textarea></div>
            <div style="display: flex; justify-content: flex-end; gap: 15px;">
              <button id="btn-back" class="btn-gray-black">返回</button>
              <button id="btn-save" class="btn-gray-blue">儲存</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="appearance-section" class="section">
      <div class="card">
        <h2 style="margin-bottom: 10px;">外觀設定</h2>
        <p style="color: var(--text-sub); font-size: 14px; margin-bottom: 40px;">自定義 / 呼叫選單時的顯示樣式</p>
        <div class="appearance-container">
          <div style="flex:1;">
            <div style="margin-bottom: 20px;"><label>背景顏色</label>
              <div class="color-picker-wrapper"><input type="color" id="cfg-bg-color"><span class="hex-code" id="bg-hex">#FFFFFF</span></div>
            </div>
            <div style="margin-bottom: 20px;"><label>選中顏色</label>
              <div class="color-picker-wrapper"><input type="color" id="cfg-active-bg"><span class="hex-code" id="active-hex">#1A73E8</span></div>
            </div>
            <div style="display: flex; gap: 20px;">
              <div style="flex:1;"><label>名稱大小 (px)</label><input type="number" id="cfg-font-size" class="form-input"></div>
              <div style="flex:1;"><label>內容大小 (px)</label><input type="number" id="cfg-sub-font-size" class="form-input"></div>
            </div>
            <div style="margin-top:40px; display: flex; justify-content: flex-end; gap: 15px;">
              <button id="btn-reset-config" class="btn-gray-black">恢復初始</button>
              <button id="btn-save-config" class="btn-gray-blue">儲存</button>
            </div>
          </div>
          <div style="flex:1.2; background:#f1f3f4; padding:40px; border-radius:14px; display:flex; flex-direction:column; align-items:center;">
            <p style="margin-bottom:25px; font-weight:bold; color: var(--text-sub); font-size: 13px;">預覽效果</p>
            <div id="sandbox-menu">
              <div class="sb-item" id="sb-active"><b class="sb-t">已選中的提示詞名稱</b><small class="sb-s">提示詞內容</small></div>
              <div class="sb-item" style="background:#fff;"><b class="sb-t">未選中的提示詞名稱</b><small class="sb-s">提示詞內容</small></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="about-section" class="section">
      <div class="card">
        <div style="display:flex; align-items:center; gap:30px; margin-bottom:40px; background: linear-gradient(to right, #f8f9fa, #fff); padding: 25px; border-radius: 12px;">
          <div style="width:85px; height:85px; background: var(--primary-color); color:white; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; font-weight:800;">J</div>
          <div><h2>JPing</h2><p style="color: var(--primary-color); font-weight: 600; font-size: 14px;">AI 提示詞助手創作者</p></div>
        </div>
        <p style="line-height:1.9; font-size: 16px; font-weight: 500; margin-bottom: 24px;">希望能透過一些小工具的開發，解決平常工作上重複的操作。</p>
        <p style="line-height:1.9; font-size: 15px; color: var(--text-sub);">我並沒有工程背景，但我相信想法不應受限於技術。透過與 AI 進行 <b>Vibe Coding</b>，將腦中的想法一步步實踐。</p>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
