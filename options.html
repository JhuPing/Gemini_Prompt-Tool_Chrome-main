<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <title>AI 提示詞助手 - 管理後台</title>
  <style>
    /* === 以下區塊是處理：全域色彩與基礎變數定義 === */
    :root {
      --primary-color: #4285f4;
      --bg-color: #f8f9fa;
      --sidebar-color: #1e1f21;
      --text-main: #3c4043;
      --text-sub: #5f6368;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; background: var(--bg-color); color: var(--text-main); }

    /* === 以下區塊是處理：側邊導覽列與子選單樣式 (恢復原始結構) === */
    #sidebar { width: 280px; background: var(--sidebar-color); color: #fff; padding: 30px 0; flex-shrink: 0; box-shadow: 4px 0 15px rgba(0,0,0,0.1); }
    .brand { padding: 0 30px 40px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 25px; }
    .nav-item { padding: 16px 30px; cursor: pointer; color: #bdc1c6; transition: 0.3s; display: flex; align-items: center; font-size: 15px; justify-content: space-between; }
    .nav-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(66, 133, 244, 0.1); color: var(--primary-color); border-left: 5px solid var(--primary-color); font-weight: bold; }

    /* 處理子選單縮合邏輯樣式 */
    .sub-nav-container { background: rgba(0, 0, 0, 0.2); overflow: hidden; transition: max-height 0.3s ease-in-out; }
    .sub-item { padding-left: 50px; font-size: 14px; justify-content: flex-start; }
    .arrow { font-size: 10px; transition: transform 0.3s; }
    .collapsed .arrow { transform: rotate(-90deg); }
    .collapsed .sub-nav-container { max-height: 0 !important; }

    /* === 以下區塊是處理：主內容區域樣式 === */
    #main-content { flex: 1; overflow-y: auto; padding: 50px 60px; }
    .section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s ease; }
    .section.active { display: block; opacity: 1; transform: translateY(0); }
    .card { background: white; padding: 45px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }

    /* === 以下區塊是處理：表格與表單輸入樣式 === */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-transform: uppercase; font-size: 13px; color: #70757a; padding: 15px 12px; border-bottom: 2px solid #f1f3f4; text-align: left; }
    td { padding: 20px 12px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
    .form-input { width: 100%; padding: 14px 18px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; margin-top: 10px; outline: none; }
    .text-truncate { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-sub); }

    /* === 以下區塊是處理：模擬預覽樣式 (Gemini Tag & Menu) === */
    .sb-item-tag { display: flex; align-items: center; justify-content: space-between; width: 160px; height: 36px; padding: 0 12px; border-radius: 10px; border: 1.5px dashed #dadce0; font-size: 13px; background: #fff; color: #5f6368; margin-bottom: 12px; }
    .sb-item-tag.active { border-style: solid; font-weight: bold; }
    #sandbox-menu { width: 100%; max-width: 320px; border-radius: 12px; border: 1px solid #dadce0; overflow: hidden; background: #fff; }
    .sb-item { padding: 14px 18px; border-bottom: 1px solid #f1f3f4; }

    button { padding: 10px 24px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; font-size: 14px; transition: 0.2s; }
    .btn-main { background: var(--primary-color); color: white; }
    .btn-gray-blue { background: #f1f3f4; color: var(--primary-color); }
    .btn-gray-red { background: #f1f3f4; color: #d93025; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="brand">
      <div style="font-size: 22px; font-weight: 800; color: var(--primary-color);">AI 提示詞助手</div>
      <div style="font-size: 12px; color: #9aa0a6; margin-top: 4px;">讓溝通更有效率</div>
    </div>
    
    <div id="prompt-group-wrapper">
      <div class="nav-item parent-nav" id="prompt-menu-toggle"><span>提示詞設定</span><span class="arrow">▼</span></div>
      <div class="sub-nav-container" id="prompt-submenu">
        <div class="nav-item sub-item active" data-target="section-main" data-type="identities">身份</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="events">指令</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="styles">風格</div>
      </div>
    </div>
    
    <div class="nav-item" data-target="appearance-section">外觀設定</div>
  </div>

  <div id="main-content">
    <div id="section-main" class="section active">
      <div id="list-view" class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:35px;">
          <div><h2 id="page-title">身份</h2><p id="page-desc" style="color:var(--text-sub); font-size:14px;"></p></div>
          <button class="btn-main" id="btn-new">新增項目</button>
        </div>
        <table>
          <thead><tr id="table-head"></tr></thead>
          <tbody id="data-list-body"></tbody>
        </table>
      </div>

      <div id="editor-view" style="display:none;" class="card">
        <h2 id="editor-title">編輯項目</h2>
        <div style="margin-top:25px;">
          <label style="font-weight: bold;">顯示名稱</label>
          <input type="text" id="edit-label" class="form-input" placeholder="例如：中英翻譯官">
          <div style="margin-top:20px;"><label style="font-weight: bold;">提示詞內容</label>
            <textarea id="edit-text" class="form-input" style="height:300px;" placeholder="請輸入完整的 AI 提示指令..."></textarea>
          </div>
          <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:30px;">
            <button id="btn-back" style="background:#f1f3f4; color:#3c4043;">返回清單</button>
            <button id="btn-save" class="btn-main">確認儲存</button>
          </div>
        </div>
      </div>
    </div>

    <div id="appearance-section" class="section">
      <div class="card">
        <h2>外觀設定</h2>
        <div style="display:flex; gap:60px; margin-top:30px;">
          <div style="flex:1;">
            <label>選單背景顏色</label>
            <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
              <input type="color" id="cfg-bg-color"><span id="bg-hex" style="font-family: monospace;">#FFFFFF</span>
            </div>
            <label>主題色 (Tag & 選單選中狀態)</label>
            <div style="display:flex; align-items:center; gap:10px; margin:10px 0;">
              <input type="color" id="cfg-active-bg"><span id="active-hex" style="font-family: monospace;">#1A73E8</span>
            </div>
            <div style="display:flex; gap:20px; margin-top:20px;">
              <div style="flex:1;"><label>名稱字級 (px)</label><input type="number" id="cfg-font-size" class="form-input"></div>
              <div style="flex:1;"><label>內容字級 (px)</label><input type="number" id="cfg-sub-font-size" class="form-input"></div>
            </div>
            <button id="btn-save-config" class="btn-main" style="margin-top:35px; width:100%;">儲存外觀配置</button>
          </div>

          <div style="flex:1.2; background:#f8f9fa; padding:40px; border-radius:20px; display: flex; flex-direction: column; align-items: center;">
            <p style="margin-bottom:20px; font-weight:bold; color:var(--text-sub); font-size:13px;">Gemini 標籤預覽</p>
            <div class="sb-item-tag active" id="sb-tag-active"><span class="sb-t">指令：已選取項目</span><span style="font-size:16px;">✕</span></div>
            <div class="sb-item-tag"><span class="sb-t">設定身份</span></div>
            <p style="margin:30px 0 15px; font-weight:bold; color:var(--text-sub); font-size:13px;">搜尋選單預覽</p>
            <div id="sandbox-menu">
              <div class="sb-item" id="sb-active"><b class="sb-t">選中項目預覽</b><br><small class="sb-s">提示詞內容預覽文字...</small></div>
              <div class="sb-item" style="background:#fff;"><b class="sb-t">未選中項目</b><br><small class="sb-s">提示詞內容預覽文字...</small></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
