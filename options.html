<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>AI 提示詞助手 - 管理後台</title>
  <style>
    :root {
      --primary-color: #4285f4;
      --sidebar-color: #1e1f21;
      --bg-color: #f8f9fa;
      --text-main: #3c4043;
      --text-sub: #5f6368;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; background: var(--bg-color); color: var(--text-main); }

    /* 側邊欄樣式 */
    #sidebar { width: 260px; background: var(--sidebar-color); color: #fff; padding: 30px 0; flex-shrink: 0; }
    .brand { padding: 0 30px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .main-title { font-size: 20px; font-weight: 800; color: var(--primary-color); }
    .sub-title { font-size: 12px; color: #9aa0a6; }

    .nav-item { padding: 12px 30px; cursor: pointer; color: #bdc1c6; transition: 0.2s; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
    .nav-item.active { background: rgba(66, 133, 244, 0.15); color: var(--primary-color); border-left: 4px solid var(--primary-color); font-weight: bold; }

    /* 縮合選單樣式 */
    .sub-nav-container { background: rgba(0, 0, 0, 0.2); overflow: hidden; transition: max-height 0.3s ease-in-out; }
    .sub-item { padding-left: 50px; font-size: 13px; }
    .arrow { font-size: 10px; transition: transform 0.3s; }
    .collapsed .arrow { transform: rotate(-90deg); }
    .collapsed .sub-nav-container { max-height: 0; }

    /* 主內容區 */
    #main-content { flex: 1; overflow-y: auto; padding: 40px 60px; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f3f4; color: var(--text-sub); font-size: 13px; }
    td { padding: 16px 12px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
    .text-truncate { max-width: 350px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; color: var(--text-sub); }

    .form-group { margin-bottom: 25px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; }
    .form-input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 8px; font-size: 14px; }
    textarea.form-input { height: 250px; resize: vertical; }

    .btn-primary { background: var(--primary-color); color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: 600; }
    .btn-edit { color: var(--primary-color); background: none; border: 1px solid var(--primary-color); padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    .btn-del { color: #d93025; background: none; border: 1px solid #fce8e6; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="brand">
      <div class="main-title">AI 提示詞助手</div>
      <div class="sub-title">讓溝通更有效率</div>
    </div>

    <div class="nav-group-wrapper" id="prompt-group">
      <div class="nav-item parent-nav" id="prompt-menu-toggle">
        <span>提示詞設定</span>
        <span class="arrow">▼</span>
      </div>
      <div class="sub-nav-container">
        <div class="nav-item sub-item active" data-target="section-main" data-type="identities">身份</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="events">指令</div>
        <div class="nav-item sub-item" data-target="section-main" data-type="styles">風格</div>
      </div>
    </div>

    <div class="nav-item" data-target="appearance-section">外觀設定</div>
    <div class="nav-item" data-target="about-section">關於作者</div>
  </div>

  <div id="main-content">
    <div id="section-main" class="section active">
      <div id="list-view">
        <div class="card">
          <div class="header-bar">
            <div><h2 id="page-title">身份</h2><p id="page-desc" style="color: var(--text-sub); font-size: 14px;"></p></div>
            <button class="btn-primary" id="btn-new">+ 新增資料</button>
          </div>
          <table>
            <thead><tr id="table-head"></tr></thead>
            <tbody id="data-list-body"></tbody>
          </table>
        </div>
      </div>

      <div id="editor-view" style="display: none;">
        <div class="card">
          <h2 id="editor-title">編輯內容</h2>
          <div style="margin-top: 25px;">
            <div class="form-group">
              <label>名稱</label>
              <input type="text" id="edit-label" class="form-input">
            </div>
            <div class="form-group" id="group-shortcut" style="display:none;">
              <label>代號 (指令專用)</label>
              <input type="text" id="edit-shortcut" class="form-input" placeholder="例如：trans">
            </div>
            <div class="form-group">
              <label>提示詞內容</label>
              <textarea id="edit-text" class="form-input"></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
              <button id="btn-back" style="background:none; border:none; cursor:pointer;">返回</button>
              <button class="btn-primary" id="btn-save">儲存</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="appearance-section" class="section">
       <div class="card"><h2>外觀設定</h2><p>此處延用原有的設定介面...</p></div>
    </div>
    <div id="about-section" class="section">
       <div class="card"><h2>關於作者</h2><p>此處延用原有的作者介紹...</p></div>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
